<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="icon"
      href="data:,"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Emoji:wght@400&amp;display=swap"
    />
    <title>Intro animation mock</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, Helvetica, sans-serif;
        background: #090909;
        color: #f4f4f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
        background: #090909;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .stage {
        position: relative;
        display: grid;
        min-height: 100vh;
        place-items: center;
        isolation: isolate;
      }

      .sentence {
        position: relative;
        z-index: 1;
        margin: 0;
        color: #f4f4f5;
        font-size: clamp(2rem, 4vw, 3.75rem);
        font-weight: 500;
        line-height: 1;
        white-space: nowrap;
      }

      .question-target {
        opacity: 0;
      }

      .word-target {
        display: inline-block;
        mask-image: linear-gradient(
          to right,
          #000 0%,
          #000 48%,
          transparent 52%,
          transparent 100%
        );
        mask-position: 100% 0;
        mask-repeat: no-repeat;
        mask-size: 220% 100%;
        will-change: mask-position;
        -webkit-mask-image: linear-gradient(
          to right,
          #000 0%,
          #000 48%,
          transparent 52%,
          transparent 100%
        );
        -webkit-mask-position: 100% 0;
        -webkit-mask-repeat: no-repeat;
        -webkit-mask-size: 220% 100%;
      }

      .hand-shell,
      .question-shell {
        position: fixed;
        z-index: 2;
        pointer-events: none;
        will-change: top, left, width, height, opacity;
      }

      .hand-shell {
        container-type: size;
        display: grid;
        place-items: center;
      }

      .hand-glyph {
        display: block;
        color: #f4f4f5;
        font-family: 'Noto Emoji', sans-serif;
        font-size: 100cqh;
        font-variant-emoji: text;
        font-weight: 400;
        line-height: 1;
        transform-origin: 70% 70%;
        user-select: none;
      }

      .question-shell svg {
        display: block;
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .question-curve {
        fill: none;
        opacity: 0;
        stroke: #f4f4f5;
        stroke-dasharray: 1 100;
        stroke-dashoffset: 1;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 12;
      }

      .question-dot {
        position: absolute;
        top: 82.6667%;
        left: 50%;
        display: none;
        width: 16%;
        aspect-ratio: 1;
        border-radius: 9999px;
        background: #f4f4f5;
        opacity: 0;
        transform: translate(-50%, -50%) scale(0);
        transform-origin: center;
      }

      .question-tracer {
        fill: #f4f4f5;
        opacity: 0;
        transform-box: view-box;
        transform-origin: 0 0;
      }

      .panel {
        position: fixed;
        z-index: 10;
        bottom: 12px;
        left: 12px;
        width: min(380px, calc(100vw - 24px));
        max-height: calc(100vh - 24px);
        overflow: auto;
        border: 1px solid #343438;
        border-radius: 10px;
        background: rgb(18 18 20 / 94%);
        color: #e4e4e7;
        font-size: 12px;
        box-shadow: 0 16px 60px rgb(0 0 0 / 45%);
        backdrop-filter: blur(16px);
      }

      .panel summary {
        display: flex;
        cursor: pointer;
        list-style: none;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px;
        user-select: none;
      }

      .panel summary::-webkit-details-marker {
        display: none;
      }

      .panel-title {
        font-weight: 600;
      }

      .phase {
        overflow: hidden;
        max-width: 190px;
        color: #a1a1aa;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .panel-body {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        padding: 0 12px 12px;
      }

      .control {
        display: grid;
        gap: 5px;
      }

      .control-wide {
        grid-column: 1 / -1;
      }

      .control label {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        color: #b4b4bc;
      }

      .control output {
        color: #fafafa;
        font-variant-numeric: tabular-nums;
      }

      .control input,
      .control select {
        width: 100%;
      }

      .control select {
        min-height: 30px;
        border: 1px solid #3f3f46;
        border-radius: 6px;
        background: #18181b;
        color: #fafafa;
      }

      input[type='range'] {
        accent-color: #f4f4f5;
      }

      .panel-actions {
        display: flex;
        grid-column: 1 / -1;
        gap: 8px;
        padding-top: 2px;
      }

      .panel-actions button {
        min-height: 34px;
        flex: 1;
        cursor: pointer;
        border: 1px solid #3f3f46;
        border-radius: 7px;
        background: #27272a;
        color: #fafafa;
      }

      .panel-actions button:first-child {
        border-color: #e4e4e7;
        background: #f4f4f5;
        color: #09090b;
      }

      .hint {
        grid-column: 1 / -1;
        margin: 0;
        color: #71717a;
        line-height: 1.45;
      }

      @media (max-width: 560px) {
        .panel-body {
          grid-template-columns: 1fr;
        }

        .sentence {
          font-size: clamp(1.75rem, 8vw, 2.5rem);
        }
      }
    </style>
  </head>
  <body>
    <main
      class="stage"
      aria-label="Intro animation prototype"
    >
      <h1
        class="sentence"
        aria-label="hey, who is Dash?"
      >
        <span id="heyTarget">hey, </span
        ><span
          id="wordTarget"
          class="word-target"
          >who is Dash</span
        ><span
          id="questionTarget"
          class="question-target"
          >?</span
        >
      </h1>

      <div
        id="handShell"
        class="hand-shell"
        aria-hidden="true"
      >
        <span
          id="handGlyph"
          class="hand-glyph"
          >&#x1f44b;&#xfe0e;</span
        >
      </div>

      <div
        id="questionShell"
        class="question-shell"
        aria-hidden="true"
      >
        <svg viewBox="0 0 100 150">
          <path
            id="questionCurve"
            class="question-curve"
            pathLength="1"
            d="M 24 31 C 26 10, 49 4, 68 12 C 88 21, 89 47, 72 60 C 61 69, 51 71, 50 88"
          />
          <circle
            id="questionTracer"
            class="question-tracer"
            cx="24"
            cy="31"
            r="6"
          />
        </svg>
        <span
          id="questionDot"
          class="question-dot"
        ></span>
      </div>
    </main>

    <details
      class="panel"
      open
    >
      <summary>
        <span class="panel-title">Dev controls</span>
        <output
          id="phase"
          class="phase"
          >ready</output
        >
      </summary>
      <div class="panel-body">
        <div class="control control-wide">
          <label for="stageScrubber">
            Stage preview
            <output id="stageOutput">0 · start</output>
          </label>
          <input
            id="stageScrubber"
            type="range"
            min="0"
            max="8"
            value="0"
            step="1"
          />
        </div>
        <div class="control">
          <label for="handSize">
            Hand height
            <output data-for="handSize"></output>
          </label>
          <input
            id="handSize"
            type="range"
            min="25"
            max="70"
            value="50"
            step="1"
            data-unit="vh"
          />
        </div>
        <div class="control">
          <label for="waveHold">
            Wave hold
            <output data-for="waveHold"></output>
          </label>
          <input
            id="waveHold"
            type="range"
            min="0"
            max="3000"
            value="2000"
            step="50"
            data-unit="ms"
          />
        </div>
        <div class="control">
          <label for="waveCycle">
            Wave cycle
            <output data-for="waveCycle"></output>
          </label>
          <input
            id="waveCycle"
            type="range"
            min="200"
            max="4000"
            value="2500"
            step="50"
            data-unit="ms"
          />
        </div>
        <div class="control">
          <label for="waveAngle">
            Wave angle
            <output data-for="waveAngle"></output>
          </label>
          <input
            id="waveAngle"
            type="range"
            min="3"
            max="28"
            value="14"
            step="1"
            data-unit="°"
          />
        </div>
        <div class="control">
          <label for="shrinkDuration">
            Shrink to “hey”
            <output data-for="shrinkDuration"></output>
          </label>
          <input
            id="shrinkDuration"
            type="range"
            min="100"
            max="2000"
            value="600"
            step="50"
            data-unit="ms"
          />
        </div>
        <div class="control">
          <label for="heyRevealDuration">
            “hey” reveal
            <output data-for="heyRevealDuration"></output>
          </label>
          <input
            id="heyRevealDuration"
            type="range"
            min="0"
            max="2000"
            value="600"
            step="50"
            data-unit="ms"
          />
        </div>
        <div class="control">
          <label for="slideDuration">
            Hand settle
            <output data-for="slideDuration"></output>
          </label>
          <input
            id="slideDuration"
            type="range"
            min="100"
            max="1600"
            value="800"
            step="50"
            data-unit="ms"
          />
        </div>
        <div class="control">
          <label for="wordDelay">
            Word delay
            <output data-for="wordDelay"></output>
          </label>
          <input
            id="wordDelay"
            type="range"
            min="0"
            max="1800"
            value="0"
            step="50"
            data-unit="ms"
          />
        </div>
        <div class="control">
          <label for="fadeDuration">
            Text reveal
            <output data-for="fadeDuration"></output>
          </label>
          <input
            id="fadeDuration"
            type="range"
            min="100"
            max="3000"
            value="1500"
            step="50"
            data-unit="ms"
          />
        </div>
        <div class="control">
          <label for="questionDelay">
            Question delay
            <output data-for="questionDelay"></output>
          </label>
          <input
            id="questionDelay"
            type="range"
            min="0"
            max="1800"
            value="600"
            step="50"
            data-unit="ms"
          />
        </div>
        <div class="control">
          <label for="questionSize">
            Question height
            <output data-for="questionSize"></output>
          </label>
          <input
            id="questionSize"
            type="range"
            min="10"
            max="45"
            value="45"
            step="1"
            data-unit="vh"
          />
        </div>
        <div class="control">
          <label for="questionX">
            Question X
            <output data-for="questionX"></output>
          </label>
          <input
            id="questionX"
            type="range"
            min="35"
            max="85"
            value="64"
            step="1"
            data-unit="%"
          />
        </div>
        <div class="control">
          <label for="drawDuration">
            Question draw
            <output data-for="drawDuration"></output>
          </label>
          <input
            id="drawDuration"
            type="range"
            min="200"
            max="2600"
            value="1800"
            step="50"
            data-unit="ms"
          />
        </div>
        <div class="control">
          <label for="questionDotDelay">
            Question dot delay
            <output data-for="questionDotDelay"></output>
          </label>
          <input
            id="questionDotDelay"
            type="range"
            min="0"
            max="1200"
            value="300"
            step="50"
            data-unit="ms"
          />
        </div>
        <div class="control">
          <label for="tracerFadeDuration">
            Tracker fade
            <output data-for="tracerFadeDuration"></output>
          </label>
          <input
            id="tracerFadeDuration"
            type="range"
            min="50"
            max="500"
            value="150"
            step="25"
            data-unit="ms"
          />
        </div>
        <div class="control">
          <label for="questionSettleDelay">
            Question settle delay
            <output data-for="questionSettleDelay"></output>
          </label>
          <input
            id="questionSettleDelay"
            type="range"
            min="0"
            max="1500"
            value="300"
            step="50"
            data-unit="ms"
          />
        </div>
        <div class="control">
          <label for="tracerSize">
            Tracker size
            <output data-for="tracerSize"></output>
          </label>
          <input
            id="tracerSize"
            type="range"
            min="3"
            max="12"
            value="6"
            step="0.5"
          />
        </div>
        <div class="control">
          <label for="settleDuration">
            Question settle
            <output data-for="settleDuration"></output>
          </label>
          <input
            id="settleDuration"
            type="range"
            min="100"
            max="1800"
            value="600"
            step="50"
            data-unit="ms"
          />
        </div>
        <div class="control">
          <label for="easing">Travel easing</label>
          <select id="easing">
            <option value="cubic-bezier(.22, 1, .36, 1)">
              Smooth overshoot
            </option>
            <option value="cubic-bezier(.16, 1, .3, 1)">Fast settle</option>
            <option
              value="cubic-bezier(.65, 0, .35, 1)"
              selected
            >
              Sine-like
            </option>
            <option value="ease-in-out">Standard</option>
          </select>
        </div>
        <div class="panel-actions">
          <button
            id="replay"
            type="button"
          >
            Replay
          </button>
          <button
            id="reset"
            type="button"
          >
            Reset defaults
          </button>
        </div>
        <p class="hint">
          Drag stage preview to pause. Replay runs the full sequence.
        </p>
      </div>
    </details>

    <script>
      const defaults = {
        handSize: 50,
        waveHold: 2000,
        waveCycle: 2500,
        waveAngle: 14,
        shrinkDuration: 600,
        heyRevealDuration: 600,
        slideDuration: 800,
        wordDelay: 0,
        fadeDuration: 1500,
        questionDelay: 600,
        questionSize: 45,
        questionX: 64,
        drawDuration: 1800,
        questionDotDelay: 300,
        questionSettleDelay: 300,
        tracerFadeDuration: 150,
        tracerSize: 6,
        settleDuration: 600,
        easing: 'cubic-bezier(.65, 0, .35, 1)'
      };

      const stageLabels = [
        '0 · start',
        '1 · wave',
        '2 · hand by hey',
        '3 · hey reveal',
        '4 · word delay',
        '5 · text reveal',
        '6 · question delay',
        '7 · question drawn',
        '8 · complete'
      ];

      const nodes = {
        handGlyph: document.querySelector('#handGlyph'),
        handShell: document.querySelector('#handShell'),
        heyTarget: document.querySelector('#heyTarget'),
        phase: document.querySelector('#phase'),
        questionCurve: document.querySelector('#questionCurve'),
        questionDot: document.querySelector('#questionDot'),
        questionShell: document.querySelector('#questionShell'),
        questionTarget: document.querySelector('#questionTarget'),
        questionTracer: document.querySelector('#questionTracer'),
        replay: document.querySelector('#replay'),
        reset: document.querySelector('#reset'),
        stageOutput: document.querySelector('#stageOutput'),
        stageScrubber: document.querySelector('#stageScrubber'),
        wordTarget: document.querySelector('#wordTarget')
      };

      const controlIds = Object.keys(defaults);
      const questionFocusMode = true;
      const activeAnimations = new Set();
      let isStagePreview = false;
      let runId = 0;

      function setPhase(label, stage) {
        nodes.phase.textContent = label;

        if (stage !== undefined) {
          nodes.stageScrubber.value = stage;
          nodes.stageOutput.textContent = stageLabels[stage];
        }
      }

      function readSettings() {
        return controlIds.reduce((settings, id) => {
          const input = document.querySelector(`#${id}`);
          settings[id] =
            input.type === 'range' ? Number(input.value) : input.value;
          return settings;
        }, {});
      }

      function syncControlOutputs() {
        document.querySelectorAll('input[type="range"]').forEach((input) => {
          const output = document.querySelector(`[data-for="${input.id}"]`);
          if (!output) return;
          output.textContent = `${input.value}${input.dataset.unit || ''}`;
        });
      }

      function cancelAnimations() {
        activeAnimations.forEach((animation) => animation.cancel());
        activeAnimations.clear();
        document.getAnimations().forEach((animation) => animation.cancel());
      }

      function sleep(duration, id) {
        return new Promise((resolve) => {
          window.setTimeout(() => resolve(id === runId), duration);
        });
      }

      async function animate(element, keyframes, options, id) {
        const animation = element.animate(keyframes, options);
        activeAnimations.add(animation);

        try {
          await animation.finished;

          if (id !== runId) {
            return false;
          }

          animation.commitStyles();
          animation.cancel();
          return true;
        } catch {
          return false;
        } finally {
          activeAnimations.delete(animation);
        }
      }

      function place(element, box) {
        Object.assign(element.style, {
          height: `${box.height}px`,
          left: `${box.left}px`,
          top: `${box.top}px`,
          width: `${box.width}px`
        });
      }

      function currentBox(element) {
        const rect = element.getBoundingClientRect();
        return {
          height: rect.height,
          left: rect.left,
          top: rect.top,
          width: rect.width
        };
      }

      function keyframesBetween(from, to) {
        return [
          {
            height: `${from.height}px`,
            left: `${from.left}px`,
            top: `${from.top}px`,
            width: `${from.width}px`
          },
          {
            height: `${to.height}px`,
            left: `${to.left}px`,
            top: `${to.top}px`,
            width: `${to.width}px`
          }
        ];
      }

      function tracerTransform(path, progress) {
        const pathLength = path.getTotalLength();
        const start = path.getPointAtLength(0);
        const point = path.getPointAtLength(pathLength * progress);

        return `translate(${point.x - start.x}px, ${point.y - start.y}px)`;
      }

      function tracerKeyframes(path) {
        const sampleCount = 60;

        return Array.from({ length: sampleCount + 1 }, (_, index) => {
          const progress = index / sampleCount;

          return {
            offset: progress,
            transform: tracerTransform(path, progress)
          };
        });
      }

      function initialHandBox(settings) {
        const size = window.innerHeight * (settings.handSize / 100);
        return {
          height: size,
          left: (window.innerWidth - size) / 2,
          top: (window.innerHeight - size) / 2,
          width: size
        };
      }

      function handAfterTargetBox(target) {
        const targetBox = target.getBoundingClientRect();
        const size = targetBox.height * 1.08;
        return {
          height: size,
          left: targetBox.right - size * 0.1,
          top: targetBox.top + (targetBox.height - size) / 2,
          width: size
        };
      }

      function handAtHeyBox() {
        return handAfterTargetBox(nodes.heyTarget);
      }

      function initialQuestionBox(settings) {
        const height = window.innerHeight * (settings.questionSize / 100);
        const width = height * (2 / 3);
        return {
          height,
          left: window.innerWidth * (settings.questionX / 100) - width / 2,
          top: (window.innerHeight - height) / 2,
          width
        };
      }

      function finalQuestionBox() {
        const target = nodes.questionTarget.getBoundingClientRect();
        const height = target.height * 1.08;
        const width = height * (2 / 3);
        return {
          height,
          left: target.left + (target.width - width) / 2,
          top: target.top + (target.height - height) / 2,
          width
        };
      }

      function resetStage(settings) {
        cancelAnimations();
        nodes.heyTarget.style.opacity = '0';
        nodes.questionTarget.style.opacity = '0';
        nodes.wordTarget.style.maskPosition = '100% 0';
        nodes.wordTarget.style.webkitMaskPosition = '100% 0';
        nodes.handShell.style.opacity = '1';
        nodes.questionShell.style.opacity = '0';
        nodes.questionCurve.style.opacity = '0';
        nodes.questionCurve.style.strokeDashoffset = '1';
        nodes.questionCurve.style.strokeLinecap = 'round';
        nodes.questionDot.style.display = 'none';
        nodes.questionDot.style.opacity = '0';
        nodes.questionDot.style.transform = 'translate(-50%, -50%) scale(0)';
        nodes.questionTracer.setAttribute('r', settings.tracerSize);
        nodes.questionTracer.style.opacity = '0';
        nodes.questionTracer.style.transform = 'translate(0, 0)';
        nodes.handGlyph.style.transform = 'rotate(0deg)';
        place(nodes.handShell, initialHandBox(settings));
        place(nodes.questionShell, initialQuestionBox(settings));
      }

      async function revealText(settings, id) {
        const handKeyframes = keyframesBetween(
          currentBox(nodes.handShell),
          handAfterTargetBox(nodes.wordTarget)
        ).map((keyframe, index) => ({
          ...keyframe,
          opacity: index === 0 ? 1 : 0
        }));
        const [handMoved, textShown] = await Promise.all([
          animate(
            nodes.handShell,
            handKeyframes,
            {
              duration: settings.fadeDuration,
              easing: settings.easing,
              fill: 'forwards'
            },
            id
          ),
          animate(
            nodes.wordTarget,
            [
              { maskPosition: '100% 0', webkitMaskPosition: '100% 0' },
              { maskPosition: '0% 0', webkitMaskPosition: '0% 0' }
            ],
            {
              duration: settings.fadeDuration,
              easing: settings.easing,
              fill: 'forwards'
            },
            id
          )
        ]);

        return handMoved && textShown;
      }

      function previewStage(stage) {
        ++runId;
        isStagePreview = true;
        const settings = readSettings();
        resetStage(settings);

        nodes.stageScrubber.value = stage;
        nodes.stageOutput.textContent = stageLabels[stage];
        setPhase(`paused · ${stageLabels[stage]}`);

        if (stage === 1) {
          nodes.handGlyph.style.transform = `rotate(${settings.waveAngle}deg)`;
        }

        if (stage >= 2) {
          place(nodes.handShell, handAtHeyBox());
        }

        if (stage >= 3) {
          nodes.heyTarget.style.opacity = '1';
        }

        if (stage >= 5) {
          nodes.wordTarget.style.maskPosition = '0% 0';
          nodes.wordTarget.style.webkitMaskPosition = '0% 0';
          nodes.handShell.style.opacity = '0';
          place(nodes.handShell, handAfterTargetBox(nodes.wordTarget));
        }

        if (stage >= 7) {
          nodes.questionShell.style.opacity = '1';
          nodes.questionCurve.style.opacity = '1';
          nodes.questionCurve.style.strokeDashoffset = '0';
          nodes.questionCurve.style.strokeLinecap = 'round';
          nodes.questionDot.style.display = 'block';
          nodes.questionDot.style.opacity = '1';
          nodes.questionDot.style.transform = 'translate(-50%, -50%) scale(1)';
          nodes.questionTracer.style.opacity = '0';
        }

        if (stage >= 8) {
          place(nodes.questionShell, finalQuestionBox());
        }
      }

      async function play() {
        const id = ++runId;
        isStagePreview = false;
        const settings = readSettings();
        resetStage(settings);

        if (questionFocusMode) {
          nodes.heyTarget.style.opacity = '1';
          nodes.wordTarget.style.maskPosition = '0% 0';
          nodes.wordTarget.style.webkitMaskPosition = '0% 0';
          nodes.handShell.style.opacity = '0';
        } else {
          setPhase('1 · waving', 1);

          const wave = nodes.handGlyph.animate(
            [
              { easing: 'ease', offset: 0, transform: 'rotate(0deg)' },
              {
                easing: 'ease',
                offset: 0.1,
                transform: `rotate(${settings.waveAngle}deg)`
              },
              {
                easing: 'ease',
                offset: 0.2,
                transform: `rotate(-${settings.waveAngle * (4 / 7)}deg)`
              },
              {
                easing: 'ease',
                offset: 0.3,
                transform: `rotate(${settings.waveAngle}deg)`
              },
              {
                easing: 'ease',
                offset: 0.4,
                transform: `rotate(-${settings.waveAngle * (2 / 7)}deg)`
              },
              {
                easing: 'ease',
                offset: 0.5,
                transform: `rotate(${settings.waveAngle * (5 / 7)}deg)`
              },
              { easing: 'ease', offset: 0.6, transform: 'rotate(0deg)' },
              { offset: 1, transform: 'rotate(0deg)' }
            ],
            {
              duration: settings.waveCycle,
              easing: 'linear',
              iterations: 1
            }
          );
          activeAnimations.add(wave);

          if (!(await sleep(settings.waveHold, id))) return;

          wave.cancel();
          activeAnimations.delete(wave);
          nodes.handGlyph.style.transform = 'rotate(0deg)';

          setPhase('2 · shrinking to “hey”', 2);
          if (
            !(await animate(
              nodes.handShell,
              keyframesBetween(currentBox(nodes.handShell), handAtHeyBox()),
              {
                duration: settings.shrinkDuration,
                easing: settings.easing,
                fill: 'forwards'
              },
              id
            ))
          )
            return;

          setPhase(`3 · “hey” reveal (${settings.heyRevealDuration}ms)`, 3);
          const [heyShown, handSettled] = await Promise.all([
            animate(
              nodes.heyTarget,
              [{ opacity: 0 }, { opacity: 1 }],
              {
                duration: settings.heyRevealDuration,
                easing: 'ease-in-out',
                fill: 'forwards'
              },
              id
            ),
            sleep(settings.slideDuration, id)
          ]);
          if (!heyShown || !handSettled) return;

          setPhase(`4 · word delay (${settings.wordDelay}ms)`, 4);
          if (!(await sleep(settings.wordDelay, id))) return;

          setPhase('5 · revealing text', 5);
          if (!(await revealText(settings, id))) return;
        }

        setPhase(`6 · question delay (${settings.questionDelay}ms)`, 6);
        if (!(await sleep(settings.questionDelay, id))) return;

        setPhase('7 · drawing question mark', 7);
        nodes.questionShell.style.opacity = '1';
        const curveDuration = settings.drawDuration * 0.8;
        const dotDuration = settings.drawDuration * 0.2;

        if (
          !(await animate(
            nodes.questionTracer,
            [{ opacity: 0 }, { opacity: 1 }],
            {
              duration: settings.tracerFadeDuration,
              easing: 'ease-out',
              fill: 'forwards'
            },
            id
          ))
        )
          return;

        nodes.questionCurve.style.opacity = '1';
        const [curveDrawn, tracerMoved] = await Promise.all([
          animate(
            nodes.questionCurve,
            [
              {
                offset: 0,
                opacity: 1,
                strokeDashoffset: 1,
                strokeLinecap: 'round'
              },
              {
                offset: 1,
                opacity: 1,
                strokeDashoffset: 0,
                strokeLinecap: 'round'
              }
            ],
            {
              duration: curveDuration,
              easing: 'ease-in-out',
              fill: 'forwards'
            },
            id
          ),
          animate(
            nodes.questionTracer,
            tracerKeyframes(nodes.questionCurve),
            {
              duration: curveDuration,
              easing: 'ease-in-out',
              fill: 'forwards'
            },
            id
          )
        ]);
        if (!curveDrawn || !tracerMoved) return;

        setPhase('7 · hiding tracker', 7);
        if (
          !(await animate(
            nodes.questionTracer,
            [{ opacity: 1 }, { opacity: 0 }],
            {
              duration: settings.tracerFadeDuration,
              easing: 'ease-in',
              fill: 'forwards'
            },
            id
          ))
        )
          return;

        setPhase(`7 · dot delay (${settings.questionDotDelay}ms)`, 7);
        if (!(await sleep(settings.questionDotDelay, id))) return;

        setPhase('7 · drawing question dot', 7);
        nodes.questionDot.style.display = 'block';
        if (
          !(await animate(
            nodes.questionDot,
            [
              {
                opacity: 0,
                transform: 'translate(-50%, -50%) scale(0)'
              },
              {
                opacity: 1,
                transform: 'translate(-50%, -50%) scale(1)'
              }
            ],
            {
              duration: dotDuration,
              easing: settings.easing,
              fill: 'forwards'
            },
            id
          ))
        )
          return;

        setPhase(`7 · settle delay (${settings.questionSettleDelay}ms)`, 7);
        if (!(await sleep(settings.questionSettleDelay, id))) return;

        setPhase('8 · question settling', 8);
        if (
          !(await animate(
            nodes.questionShell,
            keyframesBetween(
              currentBox(nodes.questionShell),
              finalQuestionBox()
            ),
            {
              duration: settings.settleDuration,
              easing: settings.easing,
              fill: 'forwards'
            },
            id
          ))
        )
          return;

        setPhase('complete · hey, who is Dash?', 8);
      }

      document.querySelectorAll('input[type="range"]').forEach((input) => {
        input.addEventListener('input', () => {
          syncControlOutputs();

          if (isStagePreview && input !== nodes.stageScrubber) {
            previewStage(Number(nodes.stageScrubber.value));
          }
        });
      });

      nodes.stageScrubber.addEventListener('input', () => {
        previewStage(Number(nodes.stageScrubber.value));
      });
      nodes.replay.addEventListener('click', play);
      nodes.reset.addEventListener('click', () => {
        controlIds.forEach((id) => {
          document.querySelector(`#${id}`).value = defaults[id];
        });
        syncControlOutputs();
        play();
      });

      window.addEventListener('resize', () => {
        if (isStagePreview) {
          previewStage(Number(nodes.stageScrubber.value));
          return;
        }

        if (nodes.phase.textContent.startsWith('complete')) return;
        play();
      });

      syncControlOutputs();
      window.requestAnimationFrame(play);
    </script>
  </body>
</html>
